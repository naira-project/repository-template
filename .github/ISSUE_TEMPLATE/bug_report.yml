name: Bug Report
description: Report a bug in Naira
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what happened...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Naira Version
      description: "What version are you running? (e.g. 0.1.0, main branch, commit hash)"
      placeholder: "0.1.0"
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      options:
        - Compose (local)
        - Helm / Kubernetes
        - Local dev (make dev)
        - Other
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched the existing issues and this is not a duplicate.
          required: true
        - label: I am running the latest version (or have checked if this is already fixed on main).